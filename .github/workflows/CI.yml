name: Build Flow Launcher Favorites Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '7.0.x'

    - name: Restore dependencies
      run: dotnet restore Flow.Launcher.Plugin.Favorites.sln

    - name: Build
      run: dotnet build Flow.Launcher.Plugin.Favorites.sln --configuration Release --no-restore

    - name: Publish
      run: dotnet publish Flow.Launcher.Plugin.Favorites.csproj -c Release -o publish

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: Favorites
        path: publish
